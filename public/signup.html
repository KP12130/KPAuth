<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create account — KP</title>
  <meta name="description" content="Create your free KP account.">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <main class="page">
    <div class="card" role="main">

      <div class="brand">
        <div class="brand-mark">KP</div>
        <div>
          <div class="brand-text">KP</div>
          <div class="brand-sub">accounts.kp.app</div>
        </div>
      </div>

      <h1 class="card-title">Create your account</h1>
      <p class="card-subtitle">Join KP and sign in to any KP-connected app.</p>

      <div id="alert-box" class="alert alert-error" role="alert" aria-live="polite">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="alert-text"></span>
      </div>

      <div id="success-box" class="alert alert-success" role="status" aria-live="polite">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
        <span id="success-text">Account created! Check your email to verify your address, then sign in.</span>
      </div>

      <form id="signup-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="name">Full name</label>
          <input
            class="form-input"
            type="text"
            id="name"
            name="name"
            placeholder="Jane Doe"
            autocomplete="name"
            required
          >
          <div class="field-error" id="name-error"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input
            class="form-input"
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            autocomplete="email"
            required
          >
          <div class="field-error" id="email-error"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-wrapper">
            <input
              class="form-input"
              type="password"
              id="password"
              name="password"
              placeholder="At least 8 characters"
              autocomplete="new-password"
              required
            >
            <button type="button" class="toggle-password" id="toggle-pass" aria-label="Toggle password visibility">
              <svg id="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg id="eye-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
          <div class="strength-bar">
            <div class="strength-fill" id="strength-fill"></div>
          </div>
          <div class="strength-label" id="strength-label"></div>
          <div class="field-error" id="password-error"></div>
        </div>

        <button type="submit" class="btn btn-primary mt-8" id="submit-btn">
          <div class="spinner" aria-hidden="true"></div>
          <span class="btn-label">Create account</span>
        </button>
      </form>

      <div class="card-footer mt-16">
        Already have an account? <a href="/login" id="login-link">Sign in</a>
      </div>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);

    // Pass OAuth params to login link
    const loginLink = document.getElementById('login-link');
    if (params.has('client_id')) {
      loginLink.href = '/login?' + params.toString();
    }

    // Password toggle
    const passwordInput = document.getElementById('password');
    const toggleBtn = document.getElementById('toggle-pass');
    document.getElementById('toggle-pass').addEventListener('click', () => {
      const isText = passwordInput.type === 'text';
      passwordInput.type = isText ? 'password' : 'text';
      document.getElementById('eye-open').style.display = isText ? 'block' : 'none';
      document.getElementById('eye-closed').style.display = isText ? 'none' : 'block';
    });

    // Password strength meter
    const strengthFill = document.getElementById('strength-fill');
    const strengthLabel = document.getElementById('strength-label');
    const strengthColors = ['#f43f5e', '#f59e0b', '#6366f1', '#10b981'];
    const strengthLabels = ['Weak', 'Fair', 'Good', 'Strong'];

    passwordInput.addEventListener('input', () => {
      const val = passwordInput.value;
      let score = 0;
      if (val.length >= 8) score++;
      if (/[A-Z]/.test(val) && /[a-z]/.test(val)) score++;
      if (/\d/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      const pct = val.length === 0 ? 0 : Math.max(15, score * 25);
      strengthFill.style.width = pct + '%';
      strengthFill.style.background = strengthColors[score - 1] || '#f43f5e';
      strengthLabel.textContent = val.length > 0 ? strengthLabels[score - 1] || 'Weak' : '';
    });

    // Form alerts
    const alertBox = document.getElementById('alert-box');
    const alertText = document.getElementById('alert-text');
    const successBox = document.getElementById('success-box');
    const form = document.getElementById('signup-form');
    const submitBtn = document.getElementById('submit-btn');

    function showAlert(msg) {
      alertBox.classList.add('show');
      alertText.textContent = msg;
      successBox.classList.remove('show');
    }

    function showSuccess() {
      successBox.classList.add('show');
      alertBox.classList.remove('show');
      form.style.display = 'none';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alertBox.classList.remove('show');

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!name) { showAlert('Please enter your full name.'); return; }
      if (!email) { showAlert('Please enter your email address.'); return; }
      if (password.length < 8) { showAlert('Password must be at least 8 characters.'); return; }

      submitBtn.classList.add('loading');
      submitBtn.disabled = true;

      try {
        const res = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password }),
        });

        const data = await res.json();

        if (!res.ok) {
          if (data.error === 'email_taken') {
            showAlert('An account with this email already exists. Try signing in.');
          } else {
            showAlert(data.message || 'Registration failed. Please try again.');
          }
          return;
        }

        showSuccess();
      } catch {
        showAlert('Connection error. Please try again.');
      } finally {
        submitBtn.classList.remove('loading');
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
